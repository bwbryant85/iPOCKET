<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050508">
<title>iPOCKET</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;--cyan:#00ffcc;--mag:#ff4af8;--text:#c8e8ff;--dim:#304a58;
  --card:rgba(0,255,204,0.035);--gc:0 0 22px rgba(0,255,204,0.55);--gm:0 0 22px rgba(255,74,248,0.55);
  --sat:env(safe-area-inset-top,0px);--sar:env(safe-area-inset-right,0px);
  --sab:env(safe-area-inset-bottom,0px);--sal:env(safe-area-inset-left,0px);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Orbitron',sans-serif;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;z-index:9000;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none}

/* HOME */
#home{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;overflow-y:auto;overflow-x:hidden;
padding-top:max(6vh,calc(var(–sat) + 12px));
padding-bottom:calc(var(–sab) + 70px);
padding-left:calc(var(–sal) + 18px);
padding-right:calc(var(–sar) + 18px);
gap:4px}
#logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:6px}
#title{position:relative;font-size:clamp(2.2rem,11vw,4rem);font-weight:900;letter-spacing:0.28em;color:var(–cyan);text-shadow:0 0 30px rgba(0,255,204,1),0 0 70px rgba(0,255,204,.5),0 0 120px rgba(0,255,204,.2);user-select:none;animation:title-in 1s cubic-bezier(.16,1,.3,1) both}
@keyframes title-in{from{opacity:0;transform:scale(.85) translateY(10px);letter-spacing:.5em}to{opacity:1;transform:scale(1) translateY(0);letter-spacing:.28em}}
#title::before{content:attr(data-text);position:absolute;inset:0;color:var(–mag);clip-path:polygon(0 12%,100% 12%,100% 38%,0 38%);animation:glitch-a 8s infinite;opacity:0}
#title::after{content:attr(data-text);position:absolute;inset:0;color:#00f5ff;clip-path:polygon(0 62%,100% 62%,100% 88%,0 88%);animation:glitch-b 8s infinite;opacity:0}
@keyframes glitch-a{0%,82%,100%{opacity:0;transform:translate(0)}84%{opacity:.85;transform:translate(-5px,0)}86%{opacity:.85;transform:translate(4px,0)}88%{opacity:0}}
@keyframes glitch-b{0%,82%,100%{opacity:0;transform:translate(0)}85%{opacity:.85;transform:translate(5px,1px)}87%{opacity:.85;transform:translate(-4px,-1px)}89%{opacity:0}}
#tagline{font-family:‘Share Tech Mono’,monospace;font-size:.6rem;color:var(–dim);letter-spacing:.22em;text-transform:uppercase;margin-top:4px;animation:title-in 1.2s .2s cubic-bezier(.16,1,.3,1) both}
#home-date{font-family:‘Share Tech Mono’,monospace;font-size:.65rem;color:var(–dim);letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px;animation:title-in 1.2s .35s cubic-bezier(.16,1,.3,1) both}

/* GRID */
#grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;width:100%;max-width:360px}
.cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:24%;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;border:1px solid transparent;background:var(–card);position:relative;overflow:hidden;transition:transform .18s ease,box-shadow .18s ease;animation:cell-in .6s both}
@keyframes cell-in{from{opacity:0;transform:scale(.7) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.cell::before{content:’’;position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse at 30% 25%,rgba(255,255,255,.09),transparent 65%)}
.cell:not(.empty):active{transform:scale(.87)}
.cell.empty{opacity:.12;border:1px dashed var(–dim)!important;cursor:default;pointer-events:none}
.cell .ico{font-size:clamp(1.6rem,8vw,2.3rem);line-height:1}
.cell .lbl{font-size:.44rem;letter-spacing:.1em;text-transform:uppercase;color:var(–text);opacity:.75}

/* LAYER */
#layer{position:fixed;inset:0;z-index:60;background:var(–bg);transform:scale(.06);opacity:0;pointer-events:none;transition:transform .44s cubic-bezier(.34,1.56,.64,1),opacity .28s ease}
#layer.open{transform:scale(1);opacity:1;pointer-events:all}
#app-content{width:100%;height:100%;position:relative;overflow:hidden}

/* EXIT */
#exit{
position:fixed;
bottom:calc(28px + var(–sab));
left:50%;transform:translateX(-50%) scale(0);z-index:9001;
width:54px;height:54px;border-radius:50%;
border:2px solid var(–cyan);background:rgba(3,8,15,.88);
-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
color:var(–cyan);font-size:1rem;cursor:pointer;
display:flex;align-items:center;justify-content:center;
box-shadow:var(–gc),inset 0 0 16px rgba(0,255,204,.08);
-webkit-tap-highlight-color:transparent;
transition:transform .36s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;opacity:0}
#exit.show{transform:translateX(-50%) scale(1);opacity:1}
#exit:active{transform:translateX(-50%) scale(.87);box-shadow:var(–gm),inset 0 0 16px rgba(255,74,248,.12);border-color:var(–mag);color:var(–mag)}

/* SHARED */
.tog-btn{font-family:‘Orbitron’,sans-serif;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(–dim);border:1px solid var(–dim);background:transparent;padding:7px 16px;border-radius:20px;cursor:pointer;transition:color .2s,border-color .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent}
.tog-btn:active{color:var(–cyan);border-color:var(–cyan);box-shadow:var(–gc)}
.ld{display:flex;flex-direction:column;align-items:center;gap:16px;color:var(–dim);font-family:‘Share Tech Mono’,monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;text-align:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.ld-ring{width:46px;height:46px;border:2px solid var(–dim);border-top-color:var(–cyan);border-radius:50%;animation:spin .85s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cyan-btn{font-family:‘Orbitron’,sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(–bg);background:var(–cyan);border:none;padding:11px 24px;border-radius:22px;cursor:pointer;box-shadow:var(–gc);-webkit-tap-highlight-color:transparent}
.cyan-btn:active{background:var(–mag);box-shadow:var(–gm)}
@keyframes flash{from{opacity:.85}to{opacity:0}}

/* CLOCK */
.clk-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding-bottom:calc(80px + var(–sab));padding-top:var(–sat);perspective:900px}
.clk-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:clk-in .5s cubic-bezier(.16,1,.3,1) both}
@keyframes clk-in{from{opacity:0;transform:rotateX(60deg) scale(.7);filter:blur(10px)}to{opacity:1;transform:rotateX(0) scale(1);filter:blur(0)}}
@keyframes clk-out{from{opacity:1;transform:rotateX(0) scale(1);filter:blur(0)}to{opacity:0;transform:rotateX(-60deg) scale(.7);filter:blur(10px)}}
.clk-inner.leaving{animation:clk-out .28s ease forwards}
.clk-dig{font-family:‘Share Tech Mono’,monospace;font-size:clamp(3rem,18vw,6.5rem);color:var(–cyan);line-height:1;letter-spacing:.06em;text-shadow:0 0 30px rgba(0,255,204,1),0 0 80px rgba(0,255,204,.55),0 0 160px rgba(0,255,204,.2)}
.clk-date{font-family:‘Share Tech Mono’,monospace;font-size:.68rem;color:var(–dim);letter-spacing:.18em;text-transform:uppercase}

/* WEATHER */
.wx-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;padding:0 24px;padding-top:var(–sat);padding-bottom:calc(90px + var(–sab))}
.wx-ico{font-size:4.5rem;line-height:1;filter:drop-shadow(0 0 24px rgba(255,255,255,.3))}
.wx-temp{font-size:clamp(3rem,18vw,5.5rem);font-weight:700;line-height:1}
.wx-desc{font-family:‘Share Tech Mono’,monospace;font-size:.75rem;color:var(–dim);letter-spacing:.16em;text-transform:uppercase}
.wx-row{display:flex;gap:28px;margin-top:6px}
.wx-stat{display:flex;flex-direction:column;align-items:center;gap:3px}
.wx-stat .v{font-size:.85rem}
.wx-stat .k{font-family:‘Share Tech Mono’,monospace;font-size:.52rem;color:var(–dim);letter-spacing:.1em;text-transform:uppercase}
.wx-loc{font-family:‘Share Tech Mono’,monospace;font-size:.6rem;color:var(–dim);letter-spacing:.1em}
.wx-tog{font-family:‘Orbitron’,sans-serif;font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(–dim);border:1px solid var(–dim);background:transparent;padding:7px 16px;border-radius:20px;cursor:pointer;margin-top:4px;transition:color .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
.wx-tog:active{color:var(–cyan);border-color:var(–cyan)}
.wx-city-wrap{position:relative;width:240px}
.wx-city-input{background:rgba(0,255,204,.06);border:1px solid var(–dim);color:var(–text);font-family:‘Share Tech Mono’,monospace;font-size:.9rem;padding:11px 14px;border-radius:10px;width:100%;text-align:left;outline:none;-webkit-tap-highlight-color:transparent}
.wx-city-input:focus{border-color:var(–cyan);box-shadow:var(–gc)}
.wx-dropdown{position:absolute;top:100%;left:0;right:0;background:#0a0f18;border:1px solid var(–dim);border-top:none;border-radius:0 0 10px 10px;z-index:10;display:none;max-height:180px;overflow-y:auto}
.wx-drop-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(48,74,88,.35);font-family:‘Share Tech Mono’,monospace;font-size:.68rem;color:var(–text);letter-spacing:.04em;-webkit-tap-highlight-color:transparent}
.wx-drop-item:last-child{border-bottom:none}
.wx-drop-item:active{background:rgba(0,255,204,.1)}

/* ASCII */
.asc-topbar{flex-shrink:0;width:100%;display:flex;justify-content:center;background:rgba(5,5,8,.95);
padding-top:calc(var(–sat) + 8px);padding-bottom:8px;
padding-left:calc(var(–sal) + 10px);padding-right:calc(var(–sar) + 10px)}
.asc-snap{font-family:‘Orbitron’,sans-serif;font-size:.56rem;letter-spacing:.15em;text-transform:uppercase;color:var(–bg);background:var(–cyan);border:none;padding:10px 22px;border-radius:20px;cursor:pointer;box-shadow:var(–gc);-webkit-tap-highlight-color:transparent;transition:transform .12s,background .12s}
.asc-snap:active{transform:scale(.9);background:var(–mag)}

/* SCREENSAVER */
#ss-cv{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;display:block}

/* SNAKE */
.snake-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden;position:relative;
padding-top:var(–sat);
padding-left:var(–sal);padding-right:var(–sar);
padding-bottom:calc(var(–sab) + 90px)}
#snake-hud{font-family:‘Share Tech Mono’,monospace;font-size:.7rem;color:var(–dim);letter-spacing:.18em;text-transform:uppercase;padding:8px 0 4px;width:100%;text-align:center;flex-shrink:0}
#snake-cv{display:block;flex-shrink:0}
.snake-dpad{display:grid;grid-template-columns:repeat(3,64px);grid-template-rows:repeat(2,64px);gap:6px;margin-top:8px;flex-shrink:0}
.dpad-btn{width:64px;height:64px;border-radius:14px;border:1px solid var(–dim);background:rgba(0,255,204,.05);color:var(–cyan);font-size:1.5rem;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s,transform .1s;user-select:none}
.dpad-btn:active{background:rgba(0,255,204,.2);transform:scale(.88)}
.snake-over{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(5,5,8,.88);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.snake-over h2{font-size:1.8rem;font-weight:900;letter-spacing:.2em;color:var(–mag);text-shadow:var(–gm)}
.snake-over .sco{font-family:‘Share Tech Mono’,monospace;color:var(–dim);font-size:.75rem;letter-spacing:.15em}

/* SIMON */
.simon-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
padding-top:var(–sat);padding-bottom:calc(90px + var(–sab))}
.simon-hud{font-family:‘Share Tech Mono’,monospace;font-size:.7rem;color:var(–dim);letter-spacing:.18em;text-transform:uppercase;text-align:center}
.simon-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:min(70vw,300px);height:min(70vw,300px)}
.simon-pad{border-radius:16px;cursor:pointer;opacity:.3;filter:brightness(.55);transition:opacity .08s,filter .08s,transform .08s;-webkit-tap-highlight-color:transparent}
.simon-pad.active{opacity:1;filter:brightness(1.7);transform:scale(1.05)}
.simon-pad[data-id=“0”]{background:radial-gradient(at 38% 38%,#ff5252,#7f0000)}
.simon-pad[data-id=“1”]{background:radial-gradient(at 38% 38%,#69ff47,#1b5e20)}
.simon-pad[data-id=“2”]{background:radial-gradient(at 38% 38%,#ffeb3b,#e65100)}
.simon-pad[data-id=“3”]{background:radial-gradient(at 38% 38%,#4dd0e1,#006064)}
.simon-pad.active[data-id=“0”]{box-shadow:0 0 30px rgba(255,82,82,.9)}
.simon-pad.active[data-id=“1”]{box-shadow:0 0 30px rgba(105,255,71,.9)}
.simon-pad.active[data-id=“2”]{box-shadow:0 0 30px rgba(255,235,59,.9)}
.simon-pad.active[data-id=“3”]{box-shadow:0 0 30px rgba(77,208,225,.9)}

/* DJ PAD */
.dj-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;gap:6px;
padding-top:calc(var(–sat) + 6px);
padding-left:calc(var(–sal) + 8px);padding-right:calc(var(–sar) + 8px);
padding-bottom:calc(var(–sab) + 90px);overflow-y:auto}
.dj-controls{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:420px;padding:0 2px}
.dj-bpm-row{display:flex;align-items:center;gap:8px}
.dj-bpm-btn{font-family:‘Orbitron’,sans-serif;font-size:.75rem;color:var(–cyan);border:1px solid var(–dim);background:transparent;width:34px;height:34px;border-radius:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center}
.dj-bpm-btn:active{background:rgba(0,255,204,.15)}
.dj-bpm-val{font-family:‘Share Tech Mono’,monospace;font-size:.75rem;color:var(–cyan);letter-spacing:.05em;min-width:72px;text-align:center}
.dj-loop-btn{font-family:‘Orbitron’,sans-serif;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(–dim);background:transparent;color:var(–dim);padding:6px 12px;border-radius:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .15s,border-color .15s,box-shadow .15s}
.dj-loop-btn.on{color:var(–cyan);border-color:var(–cyan);box-shadow:var(–gc)}
.dj-grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;width:100%;max-width:420px}
.dj-pad6{border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;border:1px solid rgba(255,255,255,.1);transition:transform .07s,filter .07s;position:relative;overflow:hidden;height:60px}
.dj-pad6::before{content:’’;position:absolute;inset:0;background:radial-gradient(ellipse at 32% 28%,rgba(255,255,255,.14),transparent 65%)}
.dj-pad6.hit{transform:scale(.88);filter:brightness(2.5)}
.dj-pad6.looping{box-shadow:0 0 10px rgba(255,255,255,.5);border-color:rgba(255,255,255,.6)}
.dj-pad6 .dp-ico{font-size:1.1rem;line-height:1}
.dj-pad6 .dp-lbl{font-family:‘Share Tech Mono’,monospace;font-size:.36rem;letter-spacing:.05em;text-transform:uppercase;opacity:.75;line-height:1}

/* CANVAS GAMES */
#flap-cv,#pong-cv,#brk-cv{display:block;width:100%;height:100%;touch-action:none}

/* REACTION */
.react-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s;padding-bottom:calc(80px + var(–sab));padding-top:var(–sat);user-select:none}
.react-status{font-family:‘Share Tech Mono’,monospace;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:var(–dim)}
.react-big{font-size:clamp(2.5rem,15vw,5rem);font-weight:900;letter-spacing:.1em;text-shadow:0 0 40px currentColor}
.react-sub{font-family:‘Share Tech Mono’,monospace;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(–dim)}
.react-results{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:10px}
.react-row{font-family:‘Share Tech Mono’,monospace;font-size:.65rem;color:var(–dim);letter-spacing:.1em}

/* COLOR GAME */
.cg-start-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
padding-top:var(–sat);padding-bottom:calc(80px + var(–sab))}
.cg-recall-wrap{width:100%;height:100%;display:flex;position:relative;overflow:hidden}
.cg-sliders-panel{display:flex;gap:5px;flex-shrink:0;touch-action:none;
padding-top:calc(var(–sat) + 8px);
padding-bottom:calc(var(–sab) + 90px);
padding-left:calc(var(–sal) + 8px);
padding-right:5px;
width:28%}
.cg-vslider{position:relative;flex:1;border-radius:999px;touch-action:none;cursor:pointer}
.cg-vknob{position:absolute;width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.6);left:50%;transform:translateX(-50%);pointer-events:none}
.cg-color-panel{flex:1;position:relative;display:flex;flex-direction:column;justify-content:flex-start;
padding-top:calc(var(–sat) + 12px);
padding-right:calc(var(–sar) + 12px);
padding-bottom:calc(var(–sab) + 90px)}
.cg-indicator{font-family:‘Share Tech Mono’,monospace;font-size:.68rem;letter-spacing:.12em;color:rgba(0,0,0,.3);align-self:flex-end}
.cg-next-btn{position:absolute;bottom:calc(var(–sab) + 24px);right:calc(var(–sar) + 16px)}
.cg-memorize-wrap{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-start}
.cg-mem-indicator{position:absolute;font-family:‘Share Tech Mono’,monospace;font-size:.7rem;letter-spacing:.12em;color:rgba(0,0,0,.3);top:calc(var(–sat) + 14px);left:calc(var(–sal) + 14px)}
.cg-countdown{position:absolute;top:calc(var(–sat) + 8px);right:calc(var(–sar) + 14px);text-align:right}
.cg-count-num{font-family:‘Orbitron’,sans-serif;font-size:clamp(60px,18vw,90px);font-weight:900;color:rgba(0,0,0,.22);line-height:1}
.cg-count-lbl{font-family:‘Share Tech Mono’,monospace;font-size:.62rem;color:rgba(0,0,0,.25);letter-spacing:.1em}
.cg-results-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;gap:14px;overflow-y:auto;
padding-top:calc(var(–sat) + 16px);
padding-bottom:calc(var(–sab) + 90px);
padding-left:calc(var(–sal) + 16px);padding-right:calc(var(–sar) + 16px)}
.cg-res-row{display:flex;align-items:center;gap:12px;width:100%;max-width:360px;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:14px;border:1px solid rgba(255,255,255,.06)}
.cg-swatch-pair{display:flex;gap:5px}
.cg-swatch-sm{width:44px;height:70px;border-radius:8px;border:2px solid rgba(255,255,255,.15)}
.cg-res-info{display:flex;flex-direction:column;gap:4px;flex:1}
.cg-res-score{font-size:1.3rem;font-weight:900;letter-spacing:.05em}
.cg-res-lbl{font-family:‘Share Tech Mono’,monospace;font-size:.56rem;color:var(–dim);letter-spacing:.1em}
.cg-total-row{text-align:center;margin-top:8px}
.cg-total-num{font-size:2rem;font-weight:900;color:var(–cyan);text-shadow:var(–gc);letter-spacing:.1em}
.cg-total-tag{font-family:‘Share Tech Mono’,monospace;font-size:.7rem;color:var(–dim);letter-spacing:.15em;text-transform:uppercase}
</style>

</head>
<body>

<div id="home">
  <div id="logo-wrap">
    <div id="title" data-text="iPOCKET">iPOCKET</div>
    <div id="tagline">v2.1 — Your Pocket OS</div>
  </div>
  <div id="home-date"></div>
  <div id="grid"></div>
</div>
<div id="layer"><div id="app-content"></div></div>
<button id="exit" aria-label="Close">✕</button>

<script>
(()=>{
'use strict';

const APPS=[
  {id:'clock',      name:'Clock',      ico:'🕐',col:'#00ffcc'},
  {id:'particles',  name:'Sparks',     ico:'✨',col:'#ff4af8'},
  {id:'weather',    name:'Weather',    ico:'🌤️',col:'#4dd0e1'},
  {id:'ascii',      name:'ASCII Cam',  ico:'📷',col:'#fff176'},
  {id:'screensaver',name:'Screensaver',ico:'🌊',col:'#ce93d8'},
  {id:'snake',      name:'Snake',      ico:'🐍',col:'#69ff47'},

function initClock(){
  let timer=null;
  const wrap=document.createElement('div');wrap.className='clk-wrap';content.appendChild(wrap);
  const transition=builder=>{const old=wrap.querySelector('.clk-inner');if(old){old.classList.add('leaving');setTimeout(()=>old.parentNode&&old.parentNode.removeChild(old),295);setTimeout(()=>wrap.appendChild(builder()),165);}else wrap.appendChild(builder());};
  const showDigital=anim=>{
    clearInterval(timer);
    const build=()=>{const el=document.createElement('div');el.className='clk-inner';el.innerHTML=`<div class="clk-dig" id="ct"></div><div class="clk-date" id="cd"></div><button class="tog-btn">⟳ Analog</button>`;
      const tick=()=>{const ctEl=document.getElementById('ct'),cdEl=document.getElementById('cd');if(!ctEl)return;const n=new Date();ctEl.textContent=n.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});cdEl.textContent=n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();};
      tick();timer=setInterval(tick,1000);el.querySelector('.tog-btn').onclick=()=>showAnalog(true);return el;};
    anim?transition(build):wrap.appendChild(build());};
  const showAnalog=anim=>{
    clearInterval(timer);const sz=Math.min(content.offsetWidth,content.offsetHeight-SA.t-SA.b-160)*.65;
    const build=()=>{const el=document.createElement('div');el.className='clk-inner';el.innerHTML=`<canvas id="clkc" width="${sz}" height="${sz}" style="width:${sz}px;height:${sz}px;display:block"></canvas><button class="tog-btn">⟳ Digital</button>`;el.querySelector('.tog-btn').onclick=()=>showDigital(true);setTimeout(()=>drawAnalog(sz),20);return el;};
    anim?transition(build):wrap.appendChild(build());};
  const drawAnalog=sz=>{
    const cv=document.getElementById('clkc');if(!cv)return;
    const ctx=cv.getContext('2d'),cx=sz/2,cy=sz/2,r=sz*.43;
    const hand=(a,len,w,col)=>{ctx.save();ctx.shadowColor=col;ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(cx+Math.cos(a+Math.PI)*len*.14,cy+Math.sin(a+Math.PI)*len*.14);ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);ctx.strokeStyle=col;ctx.lineWidth=w;ctx.lineCap='round';ctx.stroke();ctx.restore();};
    const draw=()=>{if(!document.getElementById('clkc')){clearInterval(timer);return;}const n=new Date(),s=n.getSeconds(),m=n.getMinutes(),h=n.getHours()%12;const sa=s/60*Math.PI*2-Math.PI/2,ma=(m+s/60)/60*Math.PI*2-Math.PI/2,ha=(h+m/60)/12*Math.PI*2-Math.PI/2;ctx.clearRect(0,0,sz,sz);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(0,255,204,.22)';ctx.lineWidth=1.5;ctx.stroke();ctx.beginPath();ctx.arc(cx,cy,r*.9,0,Math.PI*2);ctx.strokeStyle='rgba(0,255,204,.07)';ctx.lineWidth=1;ctx.stroke();for(let i=0;i<60;i++){const a=i/60*Math.PI*2,maj=i%5===0;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r*(maj?.80:.89),cy+Math.sin(a)*r*(maj?.80:.89));ctx.lineTo(cx+Math.cos(a)*r*.96,cy+Math.sin(a)*r*.96);ctx.strokeStyle=maj?'rgba(0,255,204,.8)':'rgba(0,255,204,.18)';ctx.lineWidth=maj?2.2:1;ctx.stroke();}ctx.font=`${sz*.06}px 'Share Tech Mono',monospace`;ctx.fillStyle='rgba(0,255,204,.42)';ctx.textAlign='center';ctx.textBaseline='middle';[12,3,6,9].forEach(num=>{const a=(num/12)*Math.PI*2-Math.PI/2,d=r*.72;ctx.fillText(num,cx+Math.cos(a)*d,cy+Math.sin(a)*d);});hand(ha,r*.55,sz*.024,'#cce8ff');hand(ma,r*.76,sz*.016,'#cce8ff');hand(sa,r*.84,sz*.011,'#ff4af8');ctx.beginPath();ctx.arc(cx,cy,sz*.02,0,Math.PI*2);ctx.fillStyle='var(--cyan)';ctx.shadowColor='var(--cyan)';ctx.shadowBlur=10;ctx.fill();ctx.beginPath();ctx.arc(cx,cy,sz*.009,0,Math.PI*2);ctx.fillStyle='#050508';ctx.shadowBlur=0;ctx.fill();};
    draw();timer=setInterval(draw,1000);};

}

/* ══════════════════════════════ SPARKS ══════════════════════════════ */
function initParticles(){
  const cv=document.createElement('canvas');cv.style.cssText='display:block;width:100%;height:100%;touch-action:none;';content.appendChild(cv);
  const ctx=cv.getContext('2d');let W,H,raf;
  const resize=()=>{W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight;};resize();
  const ro=new ResizeObserver(resize);ro.observe(cv);const pts=[];
  const spawn=(x,y)=>{for(let i=0;i<75+Math.random()*40;i++){const a=-Math.PI/2+(Math.random()-.5)*Math.PI*1.55,spd=4+Math.random()*14,isCore=Math.random()<.25,life=.15+Math.random()*.44;pts.push({x,y,px:x,py:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1,life,ml:life,sz:isCore?2+Math.random()*1.5:.6+Math.random()*1.2,isCore,hot:Math.random()<.12,bounced:false});}for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2,spd=1+Math.random()*5,life=.08+Math.random()*.2;pts.push({x:x+(Math.random()-.5)*18,y:y+(Math.random()-.5)*18,px:x,py:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life,ml:life,sz:.5,isCore:false,hot:false,bounced:false});}};
  const col=p=>{const t=1-p.life/p.ml;if(p.hot)return`rgb(255,255,${Math.round(255*(1-t))})`;if(t<.25)return`rgb(255,${Math.round(230-t/.25*60)},0)`;if(t<.6)return`rgb(255,${Math.round(170-(t-.25)/.35*130)},0)`;return`rgb(255,${Math.round(40*(1-(t-.6)/.4))},0)`;};
  const onPtr=e=>{const rc=cv.getBoundingClientRect(),list=e.touches||[e];for(const t of list)spawn((t.clientX-rc.left)*(W/rc.width),(t.clientY-rc.top)*(H/rc.height));};
  cv.addEventListener('click',onPtr);cv.addEventListener('touchstart',e=>{e.preventDefault();onPtr(e);},{passive:false});cv.addEventListener('touchmove',e=>{e.preventDefault();onPtr(e);},{passive:false});
  const ht=setTimeout(()=>spawn(W*.5,H*.55),1600);
  const draw=()=>{ctx.fillStyle='rgba(5,5,8,0.19)';ctx.fillRect(0,0,W,H);for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.px=p.x;p.py=p.y;p.x+=p.vx;p.y+=p.vy;p.vy+=.32;p.vx*=.991;p.life-=p.life/p.ml>.5?.022:.03;if(p.y>H&&!p.bounced){p.vy*=-.4;p.vx*=.65;p.y=H;p.bounced=true;}if(p.life<=0){pts.splice(i,1);continue;}const alpha=Math.pow(p.life/p.ml,.7),c=col(p);ctx.save();ctx.globalAlpha=alpha;const dx=p.x-p.px,dy=p.y-p.py,len=Math.sqrt(dx*dx+dy*dy);if(len>1.5){ctx.beginPath();ctx.moveTo(p.px,p.py);ctx.lineTo(p.x,p.y);ctx.strokeStyle=c;ctx.lineWidth=p.sz*alpha;ctx.shadowColor=c;ctx.shadowBlur=p.isCore?14:5;ctx.stroke();}ctx.beginPath();ctx.arc(p.x,p.y,p.sz*alpha*.7,0,Math.PI*2);ctx.fillStyle=p.hot?'#fff':c;ctx.shadowColor=p.hot?'#ffffaa':c;ctx.shadowBlur=p.isCore?18:8;ctx.fill();ctx.restore();}raf=requestAnimationFrame(draw);};
  draw();return()=>{cancelAnimationFrame(raf);clearTimeout(ht);ro.disconnect();};
}

/* ══════════════════════════════ WEATHER ══════════════════════════════ */
const WMO={0:['Clear Sky','☀️'],1:['Mainly Clear','🌤️'],2:['Partly Cloudy','⛅'],3:['Overcast','☁️'],45:['Foggy','🌫️'],48:['Icy Fog','🌫️'],51:['Light Drizzle','🌦️'],53:['Drizzle','🌦️'],55:['Heavy Drizzle','🌧️'],61:['Slight Rain','🌧️'],63:['Rain','🌧️'],65:['Heavy Rain','🌧️'],71:['Slight Snow','🌨️'],73:['Snow','❄️'],75:['Heavy Snow','❄️'],77:['Snow Grains','❄️'],80:['Rain Showers','🌦️'],81:['Showers','🌧️'],82:['Heavy Showers','🌧️'],85:['Snow Showers','🌨️'],86:['Heavy Snow Showers','🌨️'],95:['Thunderstorm','⛈️'],96:['Hail Storm','⛈️'],99:['Severe Thunderstorm','⛈️']};
function initWeather(){
  let celsius=true,wdata=null;
  const wrap=document.createElement('div');wrap.className='wx-wrap';content.appendChild(wrap);
  const comDir=d=>['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8];
  const loading=m=>{wrap.innerHTML=`<div class="ld"><div class="ld-ring"></div>${m||'Locating...'}</div>`;};
  const render=()=>{const{tc,ws,wd,code,city}=wdata,t=celsius?tc:tc*9/5+32,u=celsius?'°C':'°F';const[desc,ico]=WMO[code]||['Unknown','🌡️'];wrap.innerHTML=`<div class="wx-ico">${ico}</div><div class="wx-temp">${Math.round(t)}${u}</div><div class="wx-desc">${desc}</div><div class="wx-row"><div class="wx-stat"><span class="v">💨 ${Math.round(ws)} km/h</span><span class="k">Wind</span></div><div class="wx-stat"><span class="v">${comDir(wd)}</span><span class="k">Direction</span></div></div><div class="wx-loc">📍 ${city}</div><button class="wx-tog">Switch to ${celsius?'°F':'°C'}</button>`;wrap.querySelector('.wx-tog').onclick=()=>{celsius=!celsius;render();};};
  const fetchW=async(lat,lon,cityName)=>{try{const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);const j=await res.json(),cw=j.current_weather;let city=cityName;if(!city){try{const g=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);const gj=await g.json();city=gj.address?.city||gj.address?.town||gj.address?.village||`${lat.toFixed(1)}°, ${lon.toFixed(1)}°`;}catch{city=`${lat.toFixed(1)}°, ${lon.toFixed(1)}°`;}}wdata={tc:cw.temperature,ws:cw.windspeed,wd:cw.winddirection,code:cw.weathercode,city};render();}catch{showManual('Connection error.');}};
  const showManual=(errMsg='')=>{wrap.innerHTML=`<div class="wx-ico">🌍</div><div class="wx-desc" style="color:var(--text);letter-spacing:.08em;font-size:.75rem">Enter your city</div><div class="wx-city-wrap"><input class="wx-city-input" id="wxi" type="text" placeholder="e.g. Dunkirk, NY" autocomplete="off" spellcheck="false"><div class="wx-dropdown" id="wxdrop"></div></div>${errMsg?`<div style="font-family:'Share Tech Mono',monospace;font-size:.58rem;color:#ff6d6d;letter-spacing:.08em">${errMsg}</div>`:''}<button class="cyan-btn" id="wxgo">Search →</button>`;
    const inp=document.getElementById('wxi'),drop=document.getElementById('wxdrop');let dbt=null;
    const selCity=(lat,lon,name)=>{drop.style.display='none';loading('Fetching...');fetchW(lat,lon,name);};
    const buildDrop=results=>{if(!results.length){drop.style.display='none';return;}drop.innerHTML=results.map(loc=>{const parts=[loc.name,loc.admin1,loc.country].filter(Boolean),label=parts.join(', ');return`<div class="wx-drop-item" data-lat="${loc.latitude}" data-lon="${loc.longitude}" data-name="${label}">${label}</div>`;}).join('');drop.style.display='block';drop.querySelectorAll('.wx-drop-item').forEach(el=>{const go=()=>selCity(+el.dataset.lat,+el.dataset.lon,el.dataset.name);el.addEventListener('touchstart',e=>{e.preventDefault();go();},{passive:false});el.addEventListener('mousedown',go);});};
    inp.addEventListener('input',()=>{clearTimeout(dbt);const q=inp.value.trim();if(q.length<2){drop.style.display='none';return;}dbt=setTimeout(async()=>{try{const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&format=json`);const d=await r.json();buildDrop(d.results||[]);}catch{}},280);});
    const go=async()=>{const first=drop.querySelector('.wx-drop-item');if(first){selCity(+first.dataset.lat,+first.dataset.lon,first.dataset.name);return;}const city=inp.value.trim();if(!city)return;loading('Searching...');try{const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&format=json`);const d=await r.json();if(!d.results?.length){showManual('City not found.');return;}const loc=d.results[0];await fetchW(loc.latitude,loc.longitude,loc.name+(loc.country?', '+loc.country:''));}catch{showManual('Connection error.');}};
    document.getElementById('wxgo').onclick=go;inp.onkeydown=e=>{if(e.key==='Enter')go();};setTimeout(()=>inp.focus(),250);};
  loading();if(navigator.geolocation){navigator.geolocation.getCurrentPosition(p=>fetchW(p.coords.latitude,p.coords.longitude,null),()=>showManual(),{timeout:8000});}else showManual();
  return()=>{};
}

/* ══════════════════════════════ ASCII CAM ══════════════════════════════ */
function initASCII(){
  const wrap=document.createElement('div');wrap.style.cssText='width:100%;height:100%;background:#000;display:flex;flex-direction:column;overflow:hidden;position:relative;';content.appendChild(wrap);
  const topBar=document.createElement('div');topBar.className='asc-topbar';topBar.innerHTML='<button class="asc-snap" id="asc-snap">📸 Save Photo</button>';wrap.appendChild(topBar);
  const area=document.createElement('div');area.style.cssText='flex:1;overflow:hidden;position:relative;';wrap.appendChild(area);
  // measure available area after topbar renders
  setTimeout(()=>{
    const CW=area.offsetWidth||content.offsetWidth,CH=area.offsetHeight||content.offsetHeight-80;
    const DPR=Math.min(window.devicePixelRatio||1,2);
    const tmpCtx=document.createElement('canvas').getContext('2d');const FS=7;
    tmpCtx.font=`${FS}px 'Share Tech Mono',monospace`;
    const CHAR_W=tmpCtx.measureText('M').width||FS*.6,LINE_H=FS*1.08;
    const COLS=Math.floor(CW/CHAR_W),ROWS=Math.floor(CH/LINE_H);
    const ascCV=document.createElement('canvas');ascCV.width=Math.round(CW*DPR);ascCV.height=Math.round(CH*DPR);ascCV.style.cssText=`display:block;width:${CW}px;height:${CH}px;`;area.appendChild(ascCV);
    const ascCtx=ascCV.getContext('2d');ascCtx.scale(DPR,DPR);
    const sampCV=document.createElement('canvas');sampCV.width=COLS;sampCV.height=ROWS;
    const sampCtx=sampCV.getContext('2d',{willReadFrequently:true});
    const RAMP=' .,:;+*?%S#@';let stream=null,raf2=null;
    const vid=document.createElement('video');Object.assign(vid,{autoplay:true,playsInline:true,muted:true});vid.style.display='none';document.body.appendChild(vid);
    const frame=()=>{
      if(vid.readyState>=2){sampCtx.drawImage(vid,0,0,COLS,ROWS);const d=sampCtx.getImageData(0,0,COLS,ROWS).data;ascCtx.fillStyle='#000';ascCtx.fillRect(0,0,CW,CH);ascCtx.fillStyle='#00ffcc';ascCtx.font=`${FS}px 'Share Tech Mono',monospace`;ascCtx.textBaseline='top';for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){const i=(r*COLS+c)*4,b=(d[i]*.299+d[i+1]*.587+d[i+2]*.114)/255;ascCtx.fillText(RAMP[Math.floor(b*(RAMP.length-1))],c*CHAR_W,r*LINE_H);}}}
      raf2=requestAnimationFrame(frame);};
    document.getElementById('asc-snap').onclick=()=>{const fl=document.createElement('div');fl.style.cssText='position:absolute;inset:0;background:#fff;pointer-events:none;animation:flash .35s ease forwards;z-index:5;';area.appendChild(fl);setTimeout(()=>fl.remove(),400);ascCV.toBlob(async blob=>{const file=new File([blob],`ascii-${Date.now()}.png`,{type:'image/png'});try{if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'ASCII Photo'});}else{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=file.name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000);}}catch{}},'image/png');};
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}}).then(s=>{stream=s;vid.srcObject=s;vid.play();frame();}).catch(()=>{ascCtx.fillStyle='#000';ascCtx.fillRect(0,0,CW,CH);ascCtx.fillStyle='#00ffcc';ascCtx.font=`bold 14px 'Orbitron',sans-serif`;ascCtx.textAlign='center';ascCtx.textBaseline='middle';ascCtx.fillText('CAMERA DENIED',CW/2,CH/2);topBar.style.display='none';});
    // store for cleanup
    wrap._cleanup=()=>{cancelAnimationFrame(raf2);if(stream)stream.getTracks().forEach(t=>t.stop());vid.remove();};
  },50);
  return()=>{if(wrap._cleanup)wrap._cleanup();};
}

/* ══════════════════════════════ SCREENSAVER ══════════════════════════════ */
function initScreensaver(){
  const cv=document.createElement('canvas');cv.id='ss-cv';content.appendChild(cv);
  const gl=cv.getContext('webgl')||cv.getContext('experimental-webgl');
  if(!gl){content.innerHTML='<div class="ld">WebGL not supported</div>';return()=>{};}

/* ══════════════════════════════ SNAKE ══════════════════════════════ */
function initSnake(){
  const wrap=document.createElement('div');wrap.className='snake-wrap';content.appendChild(wrap);
  const hud=document.createElement('div');hud.id='snake-hud';hud.textContent='SCORE: 0';wrap.appendChild(hud);
  const cv=document.createElement('canvas');cv.id='snake-cv';wrap.appendChild(cv);
  const dpad=document.createElement('div');dpad.className='snake-dpad';dpad.innerHTML=`<div></div><button class="dpad-btn" data-d="up">▲</button><div></div><button class="dpad-btn" data-d="left">◀</button><button class="dpad-btn" data-d="down">▼</button><button class="dpad-btn" data-d="right">▶</button>`;wrap.appendChild(dpad);
  const CELL=17;
  const avW=content.offsetWidth-SA.l-SA.r;
  const avH=content.offsetHeight-SA.t-SA.b-36-148-90-10;
  const COLS=Math.floor(avW/CELL),ROWS=Math.floor(Math.max(avH,CELL*6)/CELL);
  cv.width=COLS*CELL;cv.height=ROWS*CELL;const ctx=cv.getContext('2d');
  let snake,dir,nextDir,food,score,gloop;
  const reset=()=>{const sx=Math.floor(COLS/2),sy=Math.floor(ROWS/2);snake=[{x:sx,y:sy},{x:sx-1,y:sy},{x:sx-2,y:sy}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;hud.textContent='SCORE: 0';const ov=wrap.querySelector('.snake-over');if(ov)ov.remove();placeFood();draw();};
  const placeFood=()=>{let p;do{p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}while(snake.some(s=>s.x===p.x&&s.y===p.y));food=p;};
  const draw=()=>{ctx.fillStyle='#050508';ctx.fillRect(0,0,cv.width,cv.height);ctx.strokeStyle='rgba(0,255,204,.025)';ctx.lineWidth=.5;for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,cv.height);ctx.stroke();}for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(cv.width,y*CELL);ctx.stroke();}const fc=food.x*CELL+CELL/2,fr=food.y*CELL+CELL/2;ctx.beginPath();ctx.arc(fc,fr,CELL/2-2,0,Math.PI*2);ctx.fillStyle='#ff4af8';ctx.shadowColor='#ff4af8';ctx.shadowBlur=20;ctx.fill();ctx.shadowBlur=0;snake.forEach((s,i)=>{const bright=1-i/snake.length*.7;ctx.fillStyle=`rgba(0,${Math.round(200+bright*55)},${Math.round(100+bright*100)},${bright})`;ctx.shadowColor='#00ffcc';ctx.shadowBlur=i===0?20:4;ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);});ctx.shadowBlur=0;};
  const step=()=>{dir=nextDir;const head={x:(snake[0].x+dir.x+COLS)%COLS,y:(snake[0].y+dir.y+ROWS)%ROWS};if(snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return;}snake.unshift(head);if(head.x===food.x&&head.y===food.y){score++;hud.textContent=`SCORE: ${score}`;placeFood();}else snake.pop();draw();};
  const gameOver=()=>{clearInterval(gloop);const ov=document.createElement('div');ov.className='snake-over';ov.innerHTML=`<h2>GAME OVER</h2><div class="sco">SCORE: ${score}</div><button class="cyan-btn" id="snk-r">PLAY AGAIN</button>`;wrap.appendChild(ov);document.getElementById('snk-r').onclick=()=>{reset();gloop=setInterval(step,115);};};
  const dm={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
  const setDir=d=>{const nd=dm[d];if(!nd)return;if(dir.x===-nd.x&&dir.y===-nd.y)return;nextDir=nd;};
  dpad.querySelectorAll('.dpad-btn').forEach(b=>{b.addEventListener('touchstart',e=>{e.preventDefault();setDir(b.dataset.d);},{passive:false});b.addEventListener('mousedown',()=>setDir(b.dataset.d));});
  const hKey=e=>{const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};if(m[e.key]){e.preventDefault();setDir(m[e.key]);}};
  document.addEventListener('keydown',hKey);reset();gloop=setInterval(step,115);
  return()=>{clearInterval(gloop);document.removeEventListener('keydown',hKey);};
}

/* ══════════════════════════════ SIMON ══════════════════════════════ */
function initSimon(){
  const wrap=document.createElement('div');wrap.className='simon-wrap';content.appendChild(wrap);
  wrap.innerHTML=`<div class="simon-hud" id="sim-hud">Press Start</div><div class="simon-grid">${[0,1,2,3].map(i=>`<div class="simon-pad" data-id="${i}"></div>`).join('')}</div><button class="cyan-btn" id="sim-start">Start</button>`;
  let seq=[],pIdx=0,level=0,playing=false,accepting=false,ac=null;const FREQS=[196,330,264,165];const hud=document.getElementById('sim-hud');
  const tone=(id,dur=.3)=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=FREQS[id];g.gain.setValueAtTime(.5,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);o.start();o.stop(ac.currentTime+dur);};
  const flash=(id,dur=360)=>{const el=wrap.querySelector(`[data-id="${id}"]`);if(!el)return;el.classList.add('active');tone(id,dur/1000);setTimeout(()=>el.classList.remove('active'),dur);};
  const wait=ms=>new Promise(r=>setTimeout(r,ms));
  const playSeq=async()=>{accepting=false;await wait(550);for(const id of seq){flash(id,380);await wait(520);}accepting=true;pIdx=0;};
  const nextRound=async()=>{level++;hud.textContent=`Level ${level}`;seq.push(Math.floor(Math.random()*4));await playSeq();};
  const startGame=async()=>{seq=[];level=0;playing=true;document.getElementById('sim-start').style.display='none';nextRound();};
  const onTap=async id=>{if(!accepting||!playing)return;flash(id,220);if(id!==seq[pIdx]){accepting=false;playing=false;await wait(150);for(let i=0;i<3;i++){[0,1,2,3].forEach(p=>flash(p,180));await wait(320);}hud.textContent=`Game Over — Level ${level}`;const btn=document.getElementById('sim-start');btn.textContent='Play Again';btn.style.display='';return;}pIdx++;if(pIdx===seq.length){await wait(480);nextRound();}};
  document.getElementById('sim-start').onclick=()=>{if(!playing)startGame();};
  wrap.querySelectorAll('.simon-pad').forEach(p=>{p.addEventListener('click',()=>onTap(+p.dataset.id));p.addEventListener('touchstart',e=>{e.preventDefault();onTap(+p.dataset.id);},{passive:false});});
  return()=>{playing=false;accepting=false;if(ac)ac.close();};
}

/* ══════════════════════════════ FLAPPY ══════════════════════════════ */
function initFlappy(){
  const cv=document.createElement('canvas');cv.id='flap-cv';content.appendChild(cv);
  const W=cv.width=content.offsetWidth,H=cv.height=content.offsetHeight;
  const ctx=cv.getContext('2d');
  const HUD_TOP=SA.t+10;
  const GRAV=.48,FLAP_V=-9,PIPE_W=58,PIPE_GAP=165,PIPE_SPD=2.8,BIRD_X=W*.22,BIRD_R=13;
  let bird,pipes,score,frame,state,raf;
  const reset=()=>{bird={y:H/2,vy:0};pipes=[];score=0;frame=0;state='wait';};
  const addPipe=()=>{const gy=HUD_TOP+60+Math.random()*(H-HUD_TOP-310);pipes.push({x:W+PIPE_W,gy,passed:false});};
  const flap=()=>{if(state==='wait')state='play';if(state==='play')bird.vy=FLAP_V;if(state==='dead')reset();};
  cv.addEventListener('click',flap);cv.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
  const checkHit=()=>{if(bird.y+BIRD_R>H-SA.b-10||bird.y-BIRD_R<HUD_TOP+40)return true;for(const p of pipes){if(BIRD_X+BIRD_R>p.x&&BIRD_X-BIRD_R<p.x+PIPE_W){if(bird.y-BIRD_R<p.gy||bird.y+BIRD_R>p.gy+PIPE_GAP)return true;}}return false;};
  const drawPipe=p=>{const grd=ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);grd.addColorStop(0,'#00b894');grd.addColorStop(1,'#00695c');ctx.fillStyle=grd;ctx.shadowColor='#00ffcc';ctx.shadowBlur=8;ctx.fillRect(p.x,0,PIPE_W,p.gy);ctx.fillRect(p.x,p.gy+PIPE_GAP,PIPE_W,H);ctx.shadowBlur=0;ctx.fillStyle='#00977a';ctx.fillRect(p.x-4,p.gy-18,PIPE_W+8,18);ctx.fillRect(p.x-4,p.gy+PIPE_GAP,PIPE_W+8,18);};
  const loop=()=>{ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(200,232,255,.3)';for(let i=0;i<40;i++){const sx=(i*137)%W,sy=(i*97)%H;ctx.fillRect(sx,sy,1,1);}
    if(state==='play'){bird.vy+=GRAV;bird.y+=bird.vy;frame++;if(frame%90===0)addPipe();for(const p of pipes){p.x-=PIPE_SPD;if(!p.passed&&p.x+PIPE_W<BIRD_X){p.passed=true;score++;}}pipes=pipes.filter(p=>p.x>-PIPE_W-10);if(checkHit())state='dead';}
    pipes.forEach(drawPipe);
    ctx.save();ctx.translate(BIRD_X,bird.y);ctx.rotate(Math.max(-.6,Math.min(Math.PI/3,bird.vy*.07)));ctx.beginPath();ctx.arc(0,0,BIRD_R,0,Math.PI*2);ctx.fillStyle='#ffd740';ctx.shadowColor='#ffeb3b';ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;ctx.beginPath();ctx.arc(5,-4,4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.beginPath();ctx.arc(6,-4,2,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();ctx.beginPath();ctx.moveTo(11,2);ctx.lineTo(18,0);ctx.lineTo(11,-2);ctx.fillStyle='#ff9800';ctx.fill();ctx.restore();
    ctx.font=`bold 28px 'Orbitron'`;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillStyle='var(--cyan)';ctx.shadowColor='var(--cyan)';ctx.shadowBlur=12;ctx.fillText(score,W/2,HUD_TOP+8);ctx.shadowBlur=0;
    if(state==='wait'){ctx.fillStyle='rgba(0,255,204,.8)';ctx.font=`14px 'Orbitron'`;ctx.textBaseline='middle';ctx.fillText('TAP TO START',W/2,H/2+55);}
    if(state==='dead'){ctx.fillStyle='rgba(5,5,8,.78)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff4af8';ctx.shadowColor='#ff4af8';ctx.shadowBlur=24;ctx.font=`bold 38px 'Orbitron'`;ctx.textBaseline='middle';ctx.fillText('DEAD',W/2,H/2-50);ctx.fillStyle='var(--cyan)';ctx.shadowColor='var(--cyan)';ctx.shadowBlur=10;ctx.font=`22px 'Share Tech Mono'`;ctx.fillText(`SCORE: ${score}`,W/2,H/2);ctx.fillStyle='rgba(0,255,204,.6)';ctx.shadowBlur=0;ctx.font=`13px 'Orbitron'`;ctx.fillText('TAP TO RETRY',W/2,H/2+55);}
    raf=requestAnimationFrame(loop);};
  reset();loop();return()=>cancelAnimationFrame(raf);
}

/* ══════════════════════════════ PONG ══════════════════════════════ */
function initPong(){
  const cv=document.createElement('canvas');cv.id='pong-cv';content.appendChild(cv);
  const W=cv.width=content.offsetWidth,H=cv.height=content.offsetHeight;
  const ctx=cv.getContext('2d');
  const HT=SA.t+10,HB=SA.b+10;
  const PW=90,PH=13,BR=8,CPU_SPD=3.8;
  const PLAYER_Y=H-HB-45,CPU_Y=HT+45;
  let ball,pX,cX,pScore,cScore,raf,state;
  const rrect=(x,y,w,h,r)=>{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();};
  const serve=(toPlayer)=>{const a=(Math.random()*.6+.2)*Math.PI*(toPlayer?1:-1)*(Math.random()>.5?1:-1);ball={x:W/2,y:H/2,vx:Math.cos(a)*5.5,vy:Math.sin(a)*5.5*(toPlayer?1:-1)};};
  const fullReset=()=>{pScore=0;cScore=0;pX=W/2;cX=W/2;serve(true);state='play';};fullReset();
  const onMove=e=>{const rc=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;pX=Math.max(PW/2,Math.min(W-PW/2,(t.clientX-rc.left)*(W/rc.width)));};
  cv.addEventListener('mousemove',onMove);cv.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
  cv.addEventListener('click',()=>{if(state==='over')fullReset();});cv.addEventListener('touchstart',e=>{e.preventDefault();if(state==='over')fullReset();},{passive:false});
  const loop=()=>{ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);ctx.setLineDash([8,8]);ctx.strokeStyle='rgba(0,255,204,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);
    if(state==='play'){if(cX<ball.x-CPU_SPD)cX+=CPU_SPD;else if(cX>ball.x+CPU_SPD)cX-=CPU_SPD;cX=Math.max(PW/2,Math.min(W-PW/2,cX));ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x-BR<0){ball.x=BR;ball.vx*=-1;}if(ball.x+BR>W){ball.x=W-BR;ball.vx*=-1;}if(ball.vy>0&&ball.y+BR>=PLAYER_Y&&ball.y+BR<=PLAYER_Y+PH+4&&ball.x>=pX-PW/2&&ball.x<=pX+PW/2){ball.vy=-Math.abs(ball.vy)*1.04;ball.vx+=(ball.x-pX)/(PW/2)*2.5;ball.vy=Math.max(ball.vy,-13);}if(ball.vy<0&&ball.y-BR<=CPU_Y+4&&ball.y-BR>=CPU_Y-PH&&ball.x>=cX-PW/2&&ball.x<=cX+PW/2){ball.vy=Math.abs(ball.vy)*1.04;ball.vx+=(ball.x-cX)/(PW/2)*2.5;ball.vy=Math.min(ball.vy,13);}if(ball.y>H-HB+BR){cScore++;serve(false);if(cScore>=7)state='over';}if(ball.y<HT-BR){pScore++;serve(true);if(pScore>=7)state='over';}}
    rrect(pX-PW/2,PLAYER_Y,PW,PH,PH/2);ctx.fillStyle='#00ffcc';ctx.shadowColor='#00ffcc';ctx.shadowBlur=16;ctx.fill();ctx.shadowBlur=0;
    rrect(cX-PW/2,CPU_Y-PH,PW,PH,PH/2);ctx.fillStyle='#ff4af8';ctx.shadowColor='#ff4af8';ctx.shadowBlur=16;ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(ball.x,ball.y,BR,0,Math.PI*2);ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,255,255,.9)';ctx.shadowBlur=22;ctx.fill();ctx.shadowBlur=0;
    ctx.font=`bold 32px 'Orbitron'`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='rgba(255,74,248,.55)';ctx.fillText(cScore,W*.25,H/2);ctx.fillStyle='rgba(0,255,204,.55)';ctx.fillText(pScore,W*.75,H/2);
    if(state==='over'){ctx.fillStyle='rgba(5,5,8,.82)';ctx.fillRect(0,0,W,H);const won=pScore>=7;ctx.fillStyle=won?'#00ffcc':'#ff4af8';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=24;ctx.font=`bold 34px 'Orbitron'`;ctx.textBaseline='middle';ctx.fillText(won?'YOU WIN!':'CPU WINS',W/2,H/2-44);ctx.fillStyle='rgba(200,232,255,.65)';ctx.shadowBlur=0;ctx.font=`13px 'Orbitron'`;ctx.fillText('TAP TO PLAY AGAIN',W/2,H/2+44);}
    raf=requestAnimationFrame(loop);};
  loop();return()=>cancelAnimationFrame(raf);
}

  const wrap=document.createElement('div');wrap.className='react-wrap';content.appendChild(wrap);
  let state='ready',t0,tid,results=[],round=0;const MAX_R=5;
  const RATINGS=[[180,'SUPERHUMAN ⚡','#00ffcc'],[230,'ELITE 🔥','#69ff47'],[280,'GREAT ✓','#ffeb3b'],[340,'GOOD','#ff9800'],[450,'AVERAGE','#ff6d6d'],[Infinity,'SLOW 🐢','#666']];
  const rate=ms=>RATINGS.find(r=>ms<r[0]);
  const render=(bg,main,mainCol,sub,showR)=>{wrap.style.background=bg||'var(--bg)';let h=`<div class="react-status">ROUND ${round}/${MAX_R}</div><div class="react-big" style="color:${mainCol||'var(--cyan)'}">${main}</div><div class="react-sub">${sub}</div>`;if(showR&&results.length){const avg=Math.round(results.reduce((a,b)=>a+b,0)/results.length);const r=rate(avg);h+=`<div class="react-results">${results.map((ms,i)=>{const rr=rate(ms);return`<div class="react-row" style="color:${rr[2]}">${i+1}. ${ms}ms — ${rr[1]}</div>`;}).join('')}<div class="react-row" style="color:${r[2]};font-size:.85rem;margin-top:6px">AVG: ${avg}ms — ${r[1]}</div></div>`;}wrap.innerHTML=h;};
  const start=()=>{if(state==='done'){results=[];round=0;state='ready';render('var(--bg)','READY','var(--dim)','Tap to start',false);return;}if(state!=='ready')return;round++;state='waiting';render('var(--bg)','WAIT...','var(--dim)',"Don't tap yet...",false);const delay=1400+Math.random()*3600;tid=setTimeout(()=>{state='go';t0=performance.now();render('#003322','NOW!','#00ffcc','TAP!',false);},delay);};
  const tap=()=>{if(state==='go'){const ms=Math.round(performance.now()-t0);results.push(ms);state='result';const r=rate(ms);render('var(--bg)',`${ms}ms`,r[2],r[1]+'  —  '+(round<MAX_R?'tap for next round':'tap to see results'),false);if(round>=MAX_R)setTimeout(()=>{state='done';render('var(--bg)','RESULTS','var(--text)','Your scores:',true);},1500);else setTimeout(()=>{state='ready';render('var(--bg)','READY','var(--dim)','Tap to start next round',false);},1400);}else if(state==='waiting'){clearTimeout(tid);state='early';render('#220000','EARLY!','#ff4af8','You tapped too soon',false);setTimeout(()=>{state='ready';render('var(--bg)','OOPS','var(--dim)','Wait for the flash! Tap to retry.',false);},1500);}else if(state==='ready'||state==='done'){start();}};
  wrap.addEventListener('click',tap);wrap.addEventListener('touchstart',e=>{e.preventDefault();tap();},{passive:false});
  render('var(--bg)','READY','var(--dim)','Tap to start',false);
  return()=>{clearTimeout(tid);};
}

/* ══════════════════════════════ BREAKOUT ══════════════════════════════ */
function initBreakout(){
  const cv=document.createElement('canvas');cv.id='brk-cv';content.appendChild(cv);
  const W=cv.width=content.offsetWidth,H=cv.height=content.offsetHeight;
  const ctx=cv.getContext('2d');
  const HUD_TOP=SA.t+8,HUD_BOT=SA.b+60;
  const ROWS_B=6,COLS_B=8;
  const BW=(W-16)/COLS_B,BH=22,B_TOP=HUD_TOP+36;
  const DEF_PAD_W=W*.3;
  const BRICK_COLORS=['#ff4af8','#ff6b6b','#ffd740','#69ff47','#00ffcc','#81d4fa'];
  const PAD_Y=H-HUD_BOT-20;

  const GOOD_FX=[
    {id:'WIDE',  label:'⟺ WIDE PAD',  col:'#00ffcc'},
    {id:'MULTI', label:'⊕ +BALL',     col:'#69ff47'},
    {id:'LIFE',  label:'♥ +LIFE',     col:'#ff69b4'},
    {id:'FAST',  label:'⚡ SPEED UP', col:'#ffd740'},
  ];
  const BAD_FX=[
    {id:'NARROW',label:'⟺ NARROW',   col:'#ff4af8'},
    {id:'MINUS', label:'☠ -LIFE',    col:'#ff6d6d'},
    {id:'SLOW',  label:'🐌 SLOW',    col:'#9e9e9e'},
    {id:'GHOST', label:'👻 GHOST',   col:'#ce93d8'},
  ];

  let balls,padX,padW,lives,bricks,fallingFX,raf,state,lvl,score;
  let ghostUntil=0,effectMsg='',effectMsgUntil=0;

  const makeGrid=()=>{bricks=[];for(let r=0;r<ROWS_B;r++)for(let c=0;c<COLS_B;c++){const rnd=Math.random();let fx=null;if(rnd<.1)fx=GOOD_FX[Math.floor(Math.random()*GOOD_FX.length)];else if(rnd<.2)fx=BAD_FX[Math.floor(Math.random()*BAD_FX.length)];bricks.push({x:8+c*BW,y:B_TOP+r*BH,w:BW-4,h:BH-4,alive:true,col:BRICK_COLORS[r],fx});}};

  const spawnBall=()=>({x:padX,y:PAD_Y-20,vx:(Math.random()>.5?1:-1)*3.5,vy:-5-lvl*.5});
  const fullReset=()=>{lives=3;score=0;lvl=1;padX=W/2;padW=DEF_PAD_W;ghostUntil=0;fallingFX=[];makeGrid();balls=[spawnBall()];state='play';};fullReset();

  const onMove=e=>{const rc=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;padX=Math.max(padW/2,Math.min(W-padW/2,(t.clientX-rc.left)*(W/rc.width)));};
  cv.addEventListener('mousemove',onMove);cv.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
  cv.addEventListener('click',()=>{if(state!=='play')fullReset();});cv.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='play')fullReset();},{passive:false});

  const applyFX=(fx)=>{
    const now=performance.now();effectMsg=fx.label;effectMsgUntil=now+2200;
    if(fx.id==='WIDE'){padW=Math.min(DEF_PAD_W*1.7,W*.55);setTimeout(()=>{padW=DEF_PAD_W;},7000);}
    else if(fx.id==='NARROW'){padW=Math.max(DEF_PAD_W*.45,40);setTimeout(()=>{padW=DEF_PAD_W;},6000);}
    else if(fx.id==='MULTI'){if(balls.length<6)balls.push({x:padX,y:PAD_Y-30,vx:(Math.random()-.5)*8,vy:-(5+Math.random()*3)});}
    else if(fx.id==='LIFE'){lives=Math.min(lives+1,5);}
    else if(fx.id==='MINUS'){lives--;if(lives<=0)state='dead';}
    else if(fx.id==='FAST'){balls.forEach(b=>{const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);const s=Math.min(spd*1.35,16);const a=Math.atan2(b.vy,b.vx);b.vx=Math.cos(a)*s;b.vy=Math.sin(a)*s;});}
    else if(fx.id==='SLOW'){balls.forEach(b=>{b.vx*=.65;b.vy*=.65;if(Math.abs(b.vy)<1.5)b.vy=b.vy>0?1.5:-1.5;});}
    else if(fx.id==='GHOST'){ghostUntil=now+4000;}
  };

  const loop=()=>{
    ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);const now=performance.now();
    if(state==='play'){
      // move balls
      for(let bi=balls.length-1;bi>=0;bi--){
        const b=balls[bi];b.x+=b.vx;b.y+=b.vy;
        if(b.x-8<0){b.x=8;b.vx*=-1;}if(b.x+8>W){b.x=W-8;b.vx*=-1;}
        if(b.y-8<HUD_TOP+30){b.y=HUD_TOP+30;b.vy*=-1;}
        // paddle
        const isGhost=now<ghostUntil;
        if(!isGhost&&b.vy>0&&b.y+8>=PAD_Y&&b.y+8<=PAD_Y+PH+4&&b.x>=padX-padW/2&&b.x<=padX+padW/2){b.vy=-Math.abs(b.vy)*1.04;b.vx+=(b.x-padX)/(padW/2)*2.5;const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(spd>15){b.vx*=15/spd;b.vy*=15/spd;}}
        if(b.y>H+20){balls.splice(bi,1);if(balls.length===0){lives--;if(lives<=0){state='dead';}else balls=[spawnBall()];}}
        // bricks
        for(const br of bricks){if(!br.alive)continue;if(b.x+8>br.x&&b.x-8<br.x+br.w&&b.y+8>br.y&&b.y-8<br.y+br.h){br.alive=false;score+=10;if(br.fx)fallingFX.push({x:br.x+br.w/2,y:br.y,vy:2.5,...br.fx});const oL=b.x+8-br.x,oR=br.x+br.w-b.x+8,oT=b.y+8-br.y,oB=br.y+br.h-(b.y-8);if(Math.min(oL,oR)<Math.min(oT,oB))b.vx*=-1;else b.vy*=-1;break;}}
      }
      // falling fx
      for(let i=fallingFX.length-1;i>=0;i--){const f=fallingFX[i];f.y+=f.vy;if(f.y>H){fallingFX.splice(i,1);continue;}if(f.y>=PAD_Y-14&&f.y<=PAD_Y+20&&Math.abs(f.x-padX)<padW/2+18){applyFX(f);fallingFX.splice(i,1);}}
      if(bricks.every(b=>!b.alive)){lvl++;makeGrid();balls=[spawnBall()];}
    }
    // draw bricks
    bricks.forEach(b=>{if(!b.alive)return;ctx.fillStyle=b.col;ctx.shadowColor=b.col;ctx.shadowBlur=b.fx?14:6;ctx.fillRect(b.x,b.y,b.w,b.h);if(b.fx){ctx.font='9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillText(b.fx.good===false?'☠':'★',b.x+b.w/2,b.y+b.h/2);}ctx.shadowBlur=0;});
    // falling fx items
    const PH=13;
    fallingFX.forEach(f=>{ctx.fillStyle=f.col;ctx.shadowColor=f.col;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(f.x,f.y,10,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='rgba(0,0,0,.8)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(f.id[0],f.x,f.y);});
    // paddle
    const isGhostNow=now<ghostUntil;
    ctx.save();if(isGhostNow)ctx.globalAlpha=.35;
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(padX-padW/2,PAD_Y,padW,PH,PH/2);else ctx.rect(padX-padW/2,PAD_Y,padW,PH);ctx.fillStyle='#00ffcc';ctx.shadowColor='#00ffcc';ctx.shadowBlur=16;ctx.fill();ctx.shadowBlur=0;ctx.restore();
    // balls
    balls.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,8,0,Math.PI*2);ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=20;ctx.fill();ctx.shadowBlur=0;});
    // HUD
    ctx.font=`12px 'Orbitron'`;ctx.textBaseline='top';ctx.textAlign='left';ctx.fillStyle='var(--dim)';ctx.shadowBlur=0;ctx.fillText(`LVL ${lvl}`,SA.l+8,HUD_TOP+8);ctx.textAlign='center';ctx.fillText(`${score}`,W/2,HUD_TOP+8);ctx.textAlign='right';ctx.fillText('♥'.repeat(lives),W-SA.r-8,HUD_TOP+8);
    // effect msg
    if(now<effectMsgUntil){ctx.globalAlpha=Math.min(1,(effectMsgUntil-now)/400);ctx.font=`bold 16px 'Orbitron'`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=effectMsg.includes('☠')||effectMsg.includes('NARROW')||effectMsg.includes('SLOW')||effectMsg.includes('GHOST')?'#ff4af8':'#00ffcc';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=18;ctx.fillText(effectMsg,W/2,PAD_Y-36);ctx.shadowBlur=0;ctx.globalAlpha=1;}
    if(state==='dead'||state==='done'){ctx.globalAlpha=1;ctx.fillStyle='rgba(5,5,8,.82)';ctx.fillRect(0,0,W,H);ctx.fillStyle=state==='dead'?'#ff4af8':'#00ffcc';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=24;ctx.font=`bold 36px 'Orbitron'`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(state==='dead'?'GAME OVER':'YOU WIN!',W/2,H/2-44);ctx.fillStyle='var(--cyan)';ctx.shadowBlur=0;ctx.font=`14px 'Share Tech Mono'`;ctx.fillText(`SCORE: ${score}`,W/2,H/2);ctx.fillStyle='rgba(0,255,204,.6)';ctx.font=`12px 'Orbitron'`;ctx.fillText('TAP TO RETRY',W/2,H/2+44);}
    raf=requestAnimationFrame(loop);
  };
  loop();return()=>cancelAnimationFrame(raf);
}

/* ══════════════════════════════ COLOR GAME ══════════════════════════════ */
function initColorGame(){
  const N=5;let colors=[],currentIdx=0,guessH=180,guessS=50,guessL=50,scores=[],timerInt=null;
  const hsl=(h,s,l)=>`hsl(${h},${s}%,${l}%)`;
  const hsl2hex=(h,s,l)=>{s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};return`#${f(0)}${f(8)}${f(4)}`;};
  const dist=(c,g)=>{const dh=Math.min(Math.abs(c.h-g.h),360-Math.abs(c.h-g.h))/180,ds=Math.abs(c.s-g.s)/100,dl=Math.abs(c.l-g.l)/100;return Math.sqrt(dh*dh+ds*ds+dl*dl)/Math.sqrt(3);};
  const genColors=()=>Array.from({length:N},()=>({h:Math.floor(Math.random()*360),s:55+Math.floor(Math.random()*35),l:35+Math.floor(Math.random()*30)}));

  const makeVSlider=(parent,getGrad,min,max,initVal,cb)=>{
    const track=document.createElement('div');track.className='cg-vslider';track.style.background=getGrad();
    const knob=document.createElement('div');knob.className='cg-vknob';track.appendChild(knob);parent.appendChild(track);
    let val=initVal,dragging=false;
    const upd=()=>{const p=1-(val-min)/(max-min);knob.style.top=`calc(${p*100}% - 14px)`;};upd();
    const setV=clientY=>{const r=track.getBoundingClientRect();val=Math.round(min+(1-Math.max(0,Math.min(1,(clientY-r.top)/r.height)))*(max-min));upd();cb(val);track.style.background=getGrad();};
    track.addEventListener('touchstart',e=>{e.preventDefault();setV(e.touches[0].clientY);},{passive:false});
    track.addEventListener('touchmove',e=>{e.preventDefault();setV(e.touches[0].clientY);},{passive:false});
    track.addEventListener('mousedown',e=>{dragging=true;setV(e.clientY);});
    document.addEventListener('mousemove',e=>{if(dragging)setV(e.clientY);});
    document.addEventListener('mouseup',()=>dragging=false);
    return{set:v=>{val=v;upd();track.style.background=getGrad();}};
  };

  const showStart=()=>{
    content.innerHTML='';
    const w=document.createElement('div');w.className='cg-start-wrap';content.appendChild(w);
    w.innerHTML=`<div style="font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--dim)">// COLOR MEMORY //</div><div style="font-family:'Share Tech Mono',monospace;font-size:.78rem;color:var(--dim);text-align:center;letter-spacing:.1em;max-width:280px;line-height:1.6">We show you ${N} colors one at a time.<br>Match each one from memory<br>using the sliders.</div><button class="cyan-btn" id="cg-go">Play →</button>`;
    document.getElementById('cg-go').onclick=()=>{colors=genColors();scores=[];currentIdx=0;showMemorize();};
  };

  const showMemorize=()=>{
    content.innerHTML='';
    const c=colors[currentIdx];const hex=hsl2hex(c.h,c.s,c.l);
    const w=document.createElement('div');w.className='cg-memorize-wrap';w.style.background=hex;content.appendChild(w);
    const ind=document.createElement('div');ind.className='cg-mem-indicator';ind.textContent=`${currentIdx+1} / ${N}`;w.appendChild(ind);
    const cd=document.createElement('div');cd.className='cg-countdown';cd.innerHTML=`<div class="cg-count-num" id="cgn">7</div><div class="cg-count-lbl">Seconds to remember</div>`;w.appendChild(cd);
    let secs=7;
    timerInt=setInterval(()=>{secs--;const el=document.getElementById('cgn');if(el)el.textContent=secs;if(secs<=0){clearInterval(timerInt);showRecall();}},1000);
  };

  const showRecall=()=>{
    content.innerHTML='';guessH=180;guessS=50;guessL=50;
    const outer=document.createElement('div');outer.className='cg-recall-wrap';content.appendChild(outer);
    // Sliders panel
    const sliderPanel=document.createElement('div');sliderPanel.className='cg-sliders-panel';outer.appendChild(sliderPanel);
    // Color panel
    const colorPanel=document.createElement('div');colorPanel.className='cg-color-panel';colorPanel.style.background=hsl(guessH,guessS,guessL);outer.appendChild(colorPanel);
    const ind=document.createElement('div');ind.className='cg-indicator';ind.textContent=`${currentIdx+1} / ${N}`;colorPanel.appendChild(ind);
    const nextBtn=document.createElement('button');nextBtn.className='cyan-btn cg-next-btn';nextBtn.textContent=currentIdx<N-1?'Next →':'Results →';nextBtn.onclick=()=>{scores.push({c:colors[currentIdx],g:{h:guessH,s:guessS,l:guessL}});currentIdx++;if(currentIdx>=N)showResults();else showMemorize();};outer.appendChild(nextBtn);

    const upd=()=>{colorPanel.style.background=hsl(guessH,guessS,guessL);};

    // H slider
    makeVSlider(sliderPanel,
      ()=>`linear-gradient(to bottom,hsl(0,80%,50%),hsl(60,80%,50%),hsl(120,80%,50%),hsl(180,80%,50%),hsl(240,80%,50%),hsl(300,80%,50%),hsl(360,80%,50%))`,
      0,360,guessH,v=>{guessH=v;upd();});
    // S slider
    const sSlider=makeVSlider(sliderPanel,
      ()=>`linear-gradient(to bottom,${hsl(guessH,100,guessL)},${hsl(guessH,0,guessL)})`,
      0,100,guessS,v=>{guessS=v;upd();});
    // L slider
    const lSlider=makeVSlider(sliderPanel,
      ()=>`linear-gradient(to bottom,hsl(${guessH},${guessS}%,90%),hsl(${guessH},${guessS}%,50%),hsl(${guessH},${guessS}%,10%))`,
      10,90,guessL,v=>{guessL=v;upd();});
  };

  const showResults=()=>{
    content.innerHTML='';
    const w=document.createElement('div');w.className='cg-results-wrap';content.appendChild(w);
    const title=document.createElement('div');title.style.cssText='font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);';title.textContent='// RESULTS //';w.appendChild(title);
    let total=0;
    scores.forEach((s,i)=>{const d=dist(s.c,s.g),pts=Math.max(0,Math.round((1-d)*10));total+=pts;
      const row=document.createElement('div');row.className='cg-res-row';
      const grade=pts>=9?['PERFECT','#00ffcc']:pts>=7?['GREAT','#69ff47']:pts>=5?['GOOD','#ffeb3b']:pts>=3?['OK','#ff9800']:['MISS','#ff6d6d'];
      row.innerHTML=`<div class="cg-swatch-pair"><div class="cg-swatch-sm" style="background:${hsl2hex(s.c.h,s.c.s,s.c.l)}" title="Original"></div><div class="cg-swatch-sm" style="background:${hsl2hex(s.g.h,s.g.s,s.g.l)}" title="Yours"></div></div><div class="cg-res-info"><div class="cg-res-score" style="color:${grade[1]}">${pts}/10 — ${grade[0]}</div><div class="cg-res-lbl">Color ${i+1}  ·  Hue Δ ${Math.min(Math.abs(s.c.h-s.g.h),360-Math.abs(s.c.h-s.g.h))}°</div></div>`;
      w.appendChild(row);});
    const tot=document.createElement('div');tot.className='cg-total-row';const perc=Math.round(total/N/10*100);const msg=perc>=90?'PERFECT 🎯':perc>=70?'GREAT 🔥':perc>=50?'GOOD 👍':perc>=30?'PRACTICE 😅':'KEEP TRYING 😬';tot.innerHTML=`<div class="cg-total-num">${total}/${N*10}</div><div class="cg-total-tag">${msg}</div>`;w.appendChild(tot);
    const again=document.createElement('button');again.className='cyan-btn';again.textContent='Play Again →';again.onclick=()=>{colors=genColors();scores=[];currentIdx=0;showMemorize();};w.appendChild(again);
  };

  showStart();
  return()=>{clearInterval(timerInt);};
}

})();
</script>
